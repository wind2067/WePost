<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WePost</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 顶部 -->
  <div class="header">
    <div class="logo">博群WePost <span>微博多账号批量发布</span></div>
    <div class="status-badge" id="globalStatus">就绪</div>
  </div>

  <!-- Tab 导航 -->
  <div class="nav-tabs">
    <button class="nav-tab active" data-tab="accounts">账号管理</button>
    <button class="nav-tab" data-tab="posts">文案编辑</button>
    <button class="nav-tab" data-tab="publish">发布配置</button>
    <button class="nav-tab" data-tab="logs">发布日志</button>
  </div>

  <!-- ===== 账号管理 ===== -->
  <div class="container">
    <div class="tab-content active" id="tab-accounts">
      <div class="card">
        <div class="card-title">添加账号</div>
        <div style="display:flex; gap:10px; align-items:flex-end;">
          <div style="flex:1;">
            <label>账号名（用于后台管理）</label>
            <input type="text" id="newAccountName" placeholder="例如：微博1号">
          </div>
          <button class="btn btn-primary" onclick="addAccount()">添加</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title">账号列表</div>
        <div class="toolbar">
          <div class="toolbar-left">
            <button class="btn btn-outline btn-sm" onclick="checkAllCookies()">检测所有Cookie状态</button>
          </div>
          <div class="toolbar-right">
            <span id="accountCount" style="font-size:13px; color:var(--text-light);">0 个账号</span>
          </div>
        </div>
        <div class="account-list" id="accountList">
          <div class="empty-state">还没有添加账号，在上方添加吧</div>
        </div>
      </div>
    </div>

    <!-- ===== 文案编辑 ===== -->
    <div class="tab-content" id="tab-posts">
      <div class="card">
        <div class="card-title">添加文案组合</div>
        <div style="margin-bottom: 12px;">
          <label>文字内容</label>
          <textarea id="newPostText" placeholder="输入微博文案..."></textarea>
        </div>
        <div style="margin-bottom: 12px;">
          <label>配图（可选，最多9张）</label>
          <div class="upload-area" id="uploadArea" onclick="document.getElementById('imageInput').click()">
            <div class="upload-hint">点击选择图片</div>
          </div>
          <input type="file" id="imageInput" accept="image/*" multiple style="display:none" onchange="handleImageSelect(event)">
          <div class="upload-preview" id="uploadPreview"></div>
        </div>
        <button class="btn btn-primary" id="submitBtn" onclick="addPostCombo()">添加文案</button>
        <button class="btn btn-outline" id="cancelEditBtn" onclick="cancelEdit()" style="display:none; margin-left:8px;">取消编辑</button>
      </div>

      <div class="card">
        <div class="card-title">文案列表</div>
        <div id="postList">
          <div class="empty-state">还没有添加文案</div>
        </div>
      </div>
    </div>

    <!-- ===== 发布配置 ===== -->
    <div class="tab-content" id="tab-publish">
      <div class="card">
        <div class="card-title">选择账号</div>
        <div class="toolbar">
          <div class="toolbar-left">
            <button class="btn btn-outline btn-sm" onclick="selectAllAccounts(true)">全选</button>
            <button class="btn btn-outline btn-sm" onclick="selectAllAccounts(false)">全不选</button>
          </div>
        </div>
        <div class="account-select-list" id="publishAccountList">
          <div class="empty-state">请先在「账号管理」中添加并登录账号</div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">发布设置</div>
        <div class="config-grid">
          <div class="config-item">
            <label>间隔时间（秒）</label>
            <input type="number" id="intervalSec" value="5" min="1" step="1">
            <div class="config-hint">每个账号之间的发布间隔</div>
          </div>
          <div class="config-item">
            <label>随机区间（±秒）</label>
            <input type="number" id="randomRangeSec" value="0.5" min="0" step="0.1">
            <div class="config-hint">在间隔时间基础上随机浮动，如 5±0.5 秒</div>
          </div>
          <div class="config-item">
            <label>发布可见性</label>
            <div class="radio-group">
              <label class="radio-label"><input type="radio" name="visibility" value="public" checked> 公开</label>
              <label class="radio-label"><input type="radio" name="visibility" value="followers"> 粉丝</label>
              <label class="radio-label"><input type="radio" name="visibility" value="friends"> 好友圈</label>
              <label class="radio-label"><input type="radio" name="visibility" value="private"> 仅自己可见</label>
            </div>
          </div>
          <div class="config-item">
            <label>发布顺序</label>
            <div class="radio-group">
              <label class="radio-label"><input type="radio" name="orderMode" value="sequential" checked> 按列表顺序</label>
              <label class="radio-label"><input type="radio" name="orderMode" value="random"> 随机顺序</label>
            </div>
          </div>
        </div>
        <div style="text-align:right; margin-top:16px;">
          <button class="btn btn-accent" onclick="startPublish()" id="startBtn" style="padding:12px 40px; font-size:15px;">发布</button>
        </div>
      </div>

    </div>

    <!-- ===== 发布日志 ===== -->
    <div class="tab-content" id="tab-logs">
      <div class="card" id="reportCard" style="display:none;">
        <div class="card-title">发布报告</div>
        <div class="report-grid">
          <div class="report-card total">
            <div class="report-num" id="reportTotal">0</div>
            <div class="report-label">总计</div>
          </div>
          <div class="report-card success">
            <div class="report-num" id="reportSuccess">0</div>
            <div class="report-label">成功</div>
          </div>
          <div class="report-card failed">
            <div class="report-num" id="reportFailed">0</div>
            <div class="report-label">失败</div>
          </div>
        </div>
        <div style="font-size:13px; color:var(--text-light); text-align:center;" id="reportTime"></div>
      </div>

      <div class="card">
        <div class="card-title">实时日志</div>
        <div class="log-container" id="logContainer">
          <div class="empty-state">暂无发布记录</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== 预览模态框 ===== -->
  <div class="modal-overlay" id="previewModal">
    <div class="modal">
      <div class="modal-title">发布方案预览</div>
      <div id="previewContent"></div>
      <div class="modal-actions">
        <button class="btn btn-outline" onclick="closeModal('previewModal')">关闭</button>
        <button class="btn btn-outline" onclick="rerollPreview()">刷新方案</button>
        <button class="btn btn-accent" onclick="confirmPublish()">确认发布</button>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
